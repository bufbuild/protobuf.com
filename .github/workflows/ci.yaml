name: ci
on:
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm clean-install
      - run: npm run ci
      - name: Check Diff
        run: |
          [[ -z $(git status --porcelain | tee /dev/stderr) ]] || exit 1
